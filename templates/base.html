<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{% block title %}AI步頻與動作數據分析{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap-icons.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="icon" type="image/x-icon"href="{{ url_for('static', filename='image/logo.png') }}">
  {% block extra_head %}{% endblock %}
</head>
<body>

  <nav class="app-nav">
    <div class="container-xl">
      <a class="brand" href="{{ url_for('index') }}">
        <img src="{{ url_for('static', filename='image/logo.png') }}" alt="Logo" height="48">
        AI步頻與動作數據分析
      </a>
      <div class="app-nav-links">
        {# "首頁" link removed per user request, using the brand icon instead #}
        <a href="{{ url_for('player') }}" class="{% if request.endpoint == 'player' %}active{% endif %}">選手建檔</a>
        <a href="{{ url_for('records') }}" class="{% if request.endpoint == 'records' %}active{% endif %}">選手紀錄</a>
        <a href="{{ url_for('compare') }}" class="{% if request.endpoint == 'compare' %}active{% endif %}">交叉比較</a>
      </div>
      <div class="app-nav-cta d-flex gap-2">
        <a href="{{ url_for('download_tool') }}" class="btn btn-outline-dark btn-sm">下載切幀小工具</a>
      </div>
    </div>
  </nav>

  <div class="app-main">
    {% block content %}{% endblock %}
  </div>

  <footer class="app-foot">
    <div class="container-xl d-flex flex-wrap gap-3 align-items-center">
      <span class="mono">人工智慧暨巨量資料實驗室 (先進運動表現實驗室)</span>
      <span>© 2026 All rights reserved.</span>
      <span class="ms-auto mono">國立虎尾科技大學
    </div>
  </footer>

  <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
  <script src="{{ url_for('static', filename='js/common.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
