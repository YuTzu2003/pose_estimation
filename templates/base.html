<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{% block title %}步頻分析{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  {% block extra_head %}{% endblock %}
</head>
<body>

  <nav class="app-nav">
    <div class="container-xl">
      <a class="brand" href="{{ url_for('index') }}">
        <span class="brand-mark">R</span>步頻分析
      </a>
      <div class="app-nav-links">
        {# "首頁" link removed per user request, using the brand icon instead #}
        <a href="{{ url_for('player_page') }}" class="{% if request.endpoint == 'player_page' %}active{% endif %}">選手建檔</a>
        <a href="{{ url_for('records') }}" class="{% if request.endpoint == 'records' %}active{% endif %}">選手紀錄</a>
        <a href="{{ url_for('compare') }}" class="{% if request.endpoint == 'compare' %}active{% endif %}">交叉比對</a>
      </div>
      <div class="app-nav-cta d-flex gap-2">
        <a href="{{ url_for('download_tool') }}" class="btn btn-outline-dark btn-sm">
          下載切幀小工具
        </a>
      </div>
    </div>
  </nav>

  <div class="app-main">
    {% block content %}{% endblock %}
  </div>

  <footer class="app-foot">
    <div class="container-xl d-flex flex-wrap gap-3 align-items-center">
      <span class="mono">人工智慧暨巨量資料實驗室 (先進運動表現實驗室)</span>
      <span>© 2026 All rights reserved.</span>
      <span class="ms-auto mono">國立虎尾科技大學
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='common.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
